allowBuilds:
  '@tailwindcss/oxide': true
  workerd: true
  sharp: true
  '@prisma/client': set this to true or false
  better-sqlite3: set this to true or false
  esbuild: set this to true or false
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
